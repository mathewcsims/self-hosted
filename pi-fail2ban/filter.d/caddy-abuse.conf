# Matches Caddy's JSON access log against unambiguous scanner/vuln-probe
# paths directly observed hitting this repo's Caddy in the past (WordPress
# paths, dotfiles, phpMyAdmin, xmlrpc.php, SSH key paths).
# fail2ban auto-detects Caddy's numeric "ts" field as Epoch — verify with
# fail2ban-regex before enabling; add an explicit datepattern here if
# auto-detection ever fails on a future Caddy log-format change.

[Definition]
failregex = ^.*"request":\{"remote_ip":"<HOST>".*"uri":"(?:/wp-login\.php|/wp-admin(?:/.*)?|/\.env|/\.git/.*|/xmlrpc\.php|/phpmyadmin(?:/.*)?|/\.aws/credentials|/\.ssh/id_rsa.*|/config\.php|/vendor/phpunit/.*|/actuator/.*|/cgi-bin/.*|/\.well-known/\.\..*)".*$

ignoreregex =

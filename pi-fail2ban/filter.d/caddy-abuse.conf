# Matches Caddy's JSON access log against unambiguous scanner/vuln-probe
# paths directly observed hitting this repo's Caddy (WordPress paths,
# dotfiles, phpMyAdmin, xmlrpc.php, SSH key paths; extended 2026-07-23
# after two live scanner incidents with webshell sprays / cPanel-Struts-
# Exchange sweeps).
# fail2ban auto-detects Caddy's numeric "ts" field as Epoch — verify with
# fail2ban-regex before enabling; add an explicit datepattern here if
# auto-detection ever fails on a future Caddy log-format change.
#
# DELIBERATE EXCLUSIONS — paths scanners do hit but that can be legitimate
# on this stack, so they must never auto-ban:
#   /config.json      — SPAs legitimately fetch this
#   /graphql          — a future app here could serve it for real
#   /.DS_Store        — copyparty serves user folders; Finder drops these
#                       in real shared folders
#   /autodiscover/*   — real Outlook/mail clients probe this for any
#                       domain a user types an email address for
#   root-level *.php  — copyparty serves user files at root paths; a
#                       legitimately shared .php file would ban the
#                       visitor downloading it
#
# Same false-positive rule for anything added later: only paths that can
# NEVER be served legitimately by any app behind this Caddy (remember
# copyparty exposes arbitrary user-named files/dirs).

[Definition]
failregex = ^.*"request":\{"remote_ip":"<HOST>".*"uri":"(?:/wp-login\.php|/wp-admin(?:/.*)?|/wp-content/.*|/wp-includes/.*|/wordpress(?:/.*)?|/\.env|/\.git/.*|/xmlrpc\.php|/phpmyadmin(?:/.*)?|/\.aws/.*|/\.ssh/.*|/config\.php|/vendor/phpunit/.*|/actuator/.*|/cgi-bin/.*|/\.well-known/\.\..*|/phpinfo\.php|/telescope/.*|/_profiler/.*|/ecp/.*|/v2/_catalog|/login\.action|/___proxy_subdomain_.*|/solr(?:/.*)?|/manager/html|/boaform/.*|/HNAP1.*|/GponForm/.*)".*$

ignoreregex =

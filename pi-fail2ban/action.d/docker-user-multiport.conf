# Ban action for a service published by a Docker container. Modeled on
# fail2ban's own iptables-multiport.conf, with `chain` defaulted to
# DOCKER-USER instead of INPUT (see jail.local's comment for why), and DROP
# instead of REJECT (a REJECT icmp reply doesn't behave the same in a
# FORWARD/DOCKER-USER context as in INPUT).

[Definition]
actionstart = <iptables> -N f2b-<name>
              <iptables> -A f2b-<name> -j RETURN
              <iptables> -I <chain> -p <protocol> -m multiport --dports <port> -j f2b-<name>

actionstop = <iptables> -D <chain> -p <protocol> -m multiport --dports <port> -j f2b-<name>
             <iptables> -F f2b-<name>
             <iptables> -X f2b-<name>

actioncheck = <iptables> -n -L <chain> | grep -q 'f2b-<name>[ \t]'

actionban = <iptables> -I f2b-<name> 1 -s <ip> -j DROP

actionunban = <iptables> -D f2b-<name> -s <ip> -j DROP

[Init]
name = default
protocol = tcp
chain = DOCKER-USER
port = http,https
iptables = iptables -w

# ArchiveBox (https://github.com/ArchiveBox/ArchiveBox) — self-hosted web
# archiving (wget mirror, screenshot, PDF, headless-Chrome DOM dump, media
# via yt-dlp, etc. per URL).
#
# Same architecture as every other Mac app here: TLS and the public hostname
# (archivebox.mathewcsims.uk) are handled by the Caddy reverse proxy on the
# Pi (see ../pi-reverse-proxy/); this Mac only serves plain HTTP on the LAN.
#
# ── Image: pinned to an exact tag, not `dev`/`latest` ───────────────────────
# ArchiveBox ships no stable numbered release right now — the project is
# permanently on an rc train for its 0.9.x/0.10 rewrite. A real critical RCE
# (CVE-2026-42601 / GHSA-3h23-7824-pj8r, CVSS 9.8 — unvalidated `config` JSON
# on the /add endpoint, pre-auth when PUBLIC_ADD_VIEW=True) affects <=
# 0.8.6rc0; this tag is well past that fix boundary. Pinned to the exact
# tag anyway (not the floating `dev` tag the official docker-compose.yml
# defaults to) so an upgrade is a deliberate, reviewed decision — same
# reasoning as vikunja's compose.yaml.
#
# ── Storage split: local index vs NAS-backed archive ────────────────────────
# ArchiveBox's own docs are explicit that data/index.sqlite3 must stay on a
# local, fsync-capable filesystem — SQLite's WAL locking does not work
# reliably over NFS/SMB. The bulk content in data/archive/ (screenshots,
# WARCs, media, PDFs — the part that actually grows) is officially supported
# on slower remote storage instead. So: ./data (this Mac's SSD) holds the
# index + config, and /data/archive is bind-mounted to a WD NAS export
# instead, mounted over NFS.
#
# That NFS mount happens *inside the podman-machine VM itself* (a systemd
# service — see ./nfs-mount/ and SETUP.md), not on the macOS host. Tried the
# host-mount-then-virtiofs-share approach first (mount on the Mac under
# /private, which podman-machine already shares into the VM) — confirmed
# empirically that virtiofs does not reliably cross a submount boundary: the
# VM's mount table listed the share, but every file operation through it
# failed with ENOENT. Mounting natively inside the VM's own Linux kernel
# (which is what actually runs the containers) sidesteps that entirely, and
# is one less moving part (no host-side LaunchDaemon needed at all).
#
# Bind-mounted to .../data (a subdirectory of the NFS mount), not the NFS
# export root itself: the NAS applies root_squash, so root's writes land
# owned by a mapped non-root UID, but the pre-existing export root is owned
# by real root — ArchiveBox's own init chmods whatever dir it's given and
# that fails with EPERM against a directory it doesn't own. A subdirectory
# created by the (squashed) mount script is owned by that same mapped UID,
# so ArchiveBox — also squashed to that UID — owns it and chmod succeeds.
#
# All secrets live in ./.env (gitignored — see .env.example for the template).
name: archivebox

services:
  archivebox:
    image: archivebox/archivebox:0.9.35rc102
    container_name: archivebox
    restart: unless-stopped
    # Do NOT set `user:` — on podman-machine (macOS) the container's root
    # maps to your host user, giving sane ownership on the bind mounts below
    # (same reasoning as copyparty's and vikunja's compose.yaml).
    environment:
      BASE_URL: https://archivebox.mathewcsims.uk
      TZ: Europe/London

      # ArchiveBox derives Django's ALLOWED_HOSTS/CSRF_TRUSTED_ORIGINS from
      # BASE_URL + SERVER_SECURITY_MODE itself — nothing extra to set for
      # running behind a TLS-terminating reverse proxy.

      # Archived pages can replay embedded JavaScript from the original
      # page, which is a real XSS/session-hijack risk if that JS runs
      # same-origin as the admin panel. The upstream-recommended fix is
      # per-snapshot random subdomains (safe-subdomains-fullreplay), but
      # that needs wildcard DNS + a wildcard TLS cert (DNS-01), a much bigger
      # change to this repo's Caddy setup than every other single-hostname
      # app here. Chose the simpler, still-safe alternative instead: single
      # domain, no JS execution on replay at all — snapshots render as
      # static content, so the whole embedded-JS attack class doesn't apply
      # regardless of domain. Revisit only if full-fidelity replay of
      # JS-heavy pages turns out to matter in practice.
      SERVER_SECURITY_MODE: safe-onedomain-nojsreplay

      # Private instance, full stop — no anonymous browsing, no anonymous
      # submission (PUBLIC_ADD_VIEW=True is also literally the pre-auth
      # trigger condition for the CVE noted above), and private-by-default
      # for any snapshot created (not just the index listing).
      PUBLIC_INDEX: "False"
      PUBLIC_ADD_VIEW: "False"
      PERMISSIONS: private

      # Off: ArchiveBox's own security docs warn that URLs (including any
      # embedded secret tokens/session params) are submitted to archive.org
      # *unfiltered* when this is on — the opposite of what a private
      # archive is for.
      ARCHIVEDOTORG_ENABLED: "False"

      # data/archive/ now lives on NAS-backed NFS (see above) — ripgrep (the
      # default search backend) scans every byte of every archived file per
      # search, which is fine on local SSD but slow and NAS-load-heavy over
      # the network. sqlite indexes content instead of re-scanning it.
      SEARCH_BACKEND_ENGINE: sqlite

      # Bootstraps the one admin superuser on first run only (ignored on
      # every subsequent boot once that account exists) — same
      # create-once-via-env pattern as this repo's other single-user apps.
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}

      # Django's signing key for sessions/CSRF tokens — generated explicitly
      # into .env rather than left to auto-generate-and-persist-somewhere,
      # so it's backed up the same way every other secret in this repo is.
      SECRET_KEY: ${SECRET_KEY}
    volumes:
      - ./data:/data
      - /var/mnt/archivebox-archive/data:/data/archive
    # Headless Chrome (used for the screenshot/PDF/DOM extractors) needs
    # more than Docker's 64MB default /dev/shm or it reliably crashes
    # mid-crawl — this matches ArchiveBox's own official docker-compose.yml.
    shm_size: "1gb"
    ports:
      # IMPORTANT (same podman-machine quirk as every other Mac app here): a
      # published port must be bound to the Mac's *actual* LAN IP —
      # podman-machine cannot bind 0.0.0.0 to the real interface. The Pi's
      # reverse proxy connects to this address. The router does NOT forward
      # 8000, so this is never directly internet-facing.
      - "10.0.1.14:8000:8000"
    healthcheck:
      # No confirmed dedicated /health/ endpoint for this version — hitting
      # `/` instead. curl -f only fails on 4xx/5xx, so the 302-to-login
      # redirect PUBLIC_INDEX=False produces still counts as healthy; this
      # just proves the web server itself is up and responding.
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

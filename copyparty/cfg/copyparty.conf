# copyparty configuration. Any *.conf file in /cfg is loaded automatically.
# Docs: https://github.com/9001/copyparty#configuration-files
#
# Account passwords live in ./accounts.conf, NOT here — that file is
# gitignored (see accounts.conf.example for the template). copyparty doesn't
# support ${VAR} substitution in .conf files, so this is the equivalent: it
# auto-loads every *.conf file in /cfg, so a second file merges in cleanly
# with zero change to how the container runs.

[global]
  e2dsa            # build file index on startup (enables search, dedupe, etc.)
  e2ts             # index media tags (mp3/flac/jpg metadata) for search
  no-robots        # ask search engines not to crawl this server
  # Human-readable server name (top-left in the browser + mDNS) and browser-tab
  # title — replaces the random container hostname. Change to whatever you like.
  name: Mathew's Copyparty
  bname: Mathew's Copyparty //
  # Behind the Pi's Caddy reverse proxy. TLS is terminated at Caddy, and the
  # request reaches copyparty via podman's internal gateway (192.168.127.1).
  # We must explicitly trust that proxy, or copyparty ignores Caddy's
  # X-Forwarded-Proto: https header and rejects the HTTPS login with a CORS
  # error ("rejected by cors-check").
  xff-src: lan     # trust LAN/private reverse proxies (incl. the podman gateway)
  rproxy: -1       # take the real client IP from the closest proxy (safe with one proxy)
  # Send 404 instead of 403 for denied requests ("security through ambiguity"
  # per copyparty's own --help). Without this, an unauthenticated visitor can
  # tell a private path exists (403) vs doesn't (404) just by probing it —
  # this makes both look identical. Free: nothing here uses WebDAV (the one
  # documented incompatibility), and it doesn't change behavior for anyone
  # who's actually logged in with the right access.
  vague-403
  # Brute-force login lockout: more than 9 wrong passwords in 60min bans that
  # source for 24h; more than 9 403s in 2min bans for 24h. These match
  # copyparty's own defaults exactly — stated explicitly rather than left as
  # an unwritten default, so this is reviewable here instead of only in
  # --help output.
  ban-pw: 9,60,1440
  ban-403: 9,2,1440
  # Share links: logged-in admin can create unguessable /share/<token> links for
  # any file/folder (incl. private ones), with optional expiry/password. The DB
  # lives in /cfg (persisted). shr-site makes generated links use the real domain.
  shr: /share
  shr-site: https://cp.mathewcsims.uk

[/]                # PRIVATE root (https://cp.mathewcsims.uk/) — admin only
  /w               # ...mapped to /w in the container == ./copyparty/data on disk
  accs:
    A: admin       # "A" = full access (read, write, move, delete, admin, dotfiles)
    # No anonymous access. Anonymous visitors hitting / are denied; only the
    # admin login can read or write here.

[/pub]             # PUBLIC area (https://cp.mathewcsims.uk/pub)
  /pub             # ...mapped to /pub == ./copyparty/public on disk
  accs:
    r: *           # anyone (not logged in) can view + download what's in here
    A: admin       # admin keeps full control (upload/move/delete/manage)
    # Put a file or folder in ./copyparty/public and it becomes visible to the
    # world, read-only. Nothing else is exposed. To publish another existing
    # folder later, add another [/somename] volume block pointing at it with
    # the same "r: *" + "A: admin" pattern.

[/inbox]           # DROP BOX (https://cp.mathewcsims.uk/inbox)
  /inbox           # ...mapped to /inbox == ./copyparty/inbox on disk
  accs:
    w: inbox       # WRITE-ONLY: the "inbox" login can upload but cannot list or
                   # download anything here — not others' files, not its own.
    A: admin       # only admin (you) can see and retrieve what's been dropped.
    # No "r" for anyone but admin, and no anonymous access, so a visitor must
    # know the inbox password to upload, and can never browse the contents.

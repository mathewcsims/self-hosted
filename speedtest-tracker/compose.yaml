# Speedtest Tracker (https://github.com/alexjustesen/speedtest-tracker) —
# periodic internet speed tests, charted over time.
#
# Runs ON THE PI (like Nimbus, not the Mac-resident apps) for the same
# resilience reason, AND because it makes more sense architecturally: it's
# measuring the Pi's own internet connection, so it should run on the box
# that's actually online 24/7 regardless of the Mac's state.
#
# Deploy this folder to the Pi exactly like ../nimbus/:
#   scp -r self-hosted/speedtest-tracker mathew@babel:~/
#   ssh mathew@babel
#   mkdir -p ~/speedtest-tracker/config   # must exist with the right owner
#                                          # BEFORE first `up`, see SETUP.md
#   cd ~/speedtest-tracker && docker compose up -d
#
# All secrets live in ./.env (gitignored — see .env.example for the template
# and how to generate each value). Unlike every other app in this repo,
# access is LAN-only, not just internet-facing-with-a-login — see
# ../pi-reverse-proxy/Caddyfile's speedtest.mathewcsims.uk block, which mirrors
# the mc37.mathewcsims.uk (router admin) pattern: a real public DNS record and
# Caddy-issued cert exist (needed for ACME), but Caddy refuses to proxy the
# request at all unless it's coming from a private/LAN source IP — checked at
# the reverse-proxy layer, before the request ever reaches this container, so
# this app needs no auth-bypass-on-LAN logic or IP-allowlist config of its own
# (its own ALLOWED_IPS env var is deliberately NOT used here — see SETUP.md
# for why it wouldn't actually do anything useful behind a reverse proxy that
# has no documented trusted-proxy/IP-extraction config).
name: speedtest-tracker

services:
  speedtest-tracker:
    # LinuxServer.io's image is the official one — the original first-party
    # ghcr.io/alexjustesen/speedtest-tracker image was deprecated by its own
    # maintainer as of v0.20.0 in favour of this one (confirmed via the
    # project's own README and the maintainer's deprecation issue). Pinned to
    # an exact version tag (not :latest), same discipline as every other app
    # here — checked GitHub Security Advisories for both this repo and
    # linuxserver/docker-speedtest-tracker: none published. (Two release notes
    # are oddly titled "CVE release"/"CVE PATCH" but their actual diffs are
    # unrelated minor fixes — not a real disclosed vulnerability, verified by
    # reading the release diffs directly.)
    image: lscr.io/linuxserver/speedtest-tracker:1.14.5
    container_name: speedtest-tracker
    restart: unless-stopped
    environment:
      # Matches the Pi's own user (uid=gid=1000) so the bind-mounted ./config
      # below is writable — LSIO images run as this uid/gid internally, not
      # root, unlike the podman-on-macOS apps elsewhere in this repo where
      # root auto-maps to the host user; here it's plain Docker, so the host
      # directory must already be owned by 1000:1000 before first boot (see
      # SETUP.md — `mkdir` it yourself first, don't let Docker create it as
      # root then have to fix it after).
      PUID: "1000"
      PGID: "1000"
      # Set explicitly everywhere per this repo's post-Vikunja-timezone-bug
      # practice (see vikunja/compose.yaml) — belt-and-braces since the app
      # docs and the LinuxServer base-image docs don't fully agree on which
      # of these actually governs display vs. the OS layer.
      TZ: Europe/London
      APP_TIMEZONE: Europe/London
      DISPLAY_TIMEZONE: Europe/London

      APP_URL: https://speedtest.mathewcsims.uk
      ASSET_URL: https://speedtest.mathewcsims.uk
      # Laravel's encryption key — REQUIRED, and NOT auto-generated by this
      # image (confirmed against both the app's own docs and LinuxServer's:
      # leaving it blank breaks the app, it does not fall back to generating
      # one). Generated once with `openssl rand -base64 32` and prefixed with
      # "base64:" per the docs' own instructions — see .env.example.
      APP_KEY: ${APP_KEY}

      # SQLite: no separate DB container needed, matching Vikunja's approach
      # for a single-user, low-write app — the DB lives under ./config below.
      DB_CONNECTION: sqlite

      # Initial admin account — ONLY effective on first boot. Set explicitly
      # so the account is never briefly reachable at the documented hardcoded
      # default (admin@example.com / password) even for a moment, same
      # reasoning as Vikunja's registration-never-open-even-briefly approach.
      ADMIN_NAME: Mathew
      ADMIN_EMAIL: mat@mathewcsims.uk
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}

      # Speed tests every 15 minutes (your choice — higher-resolution
      # monitoring, at the cost of more frequent bandwidth use just for
      # testing). Standard cron syntax; edit and `docker compose up -d`
      # (not `restart`) to change — this moved out of the settings UI and
      # into env-var-only config as of the app's v0.20.0.
      SPEEDTEST_SCHEDULE: "*/15 * * * *"
      # Auto-delete results older than 90 days — keeps the sqlite DB from
      # growing unbounded on 15-minutely data. Raise/remove if you want
      # longer history; there's no hard reason not to, just unbounded growth.
      PRUNE_RESULTS_OLDER_THAN: "90"

      # Explicitly off (also the default) — LAN-only access is enforced at
      # the Caddy layer (see Caddyfile), not by making results world-readable
      # without login. Keep this off even though only LAN clients can reach
      # it at all, since "LAN" still includes anyone your Wi-Fi password
      # reaches, not just you.
      PUBLIC_DASHBOARD: "false"
    volumes:
      - ./config:/config
    # No `ports:` — reached only by Caddy, over `pi-shared`, by container
    # name, same pattern as ../nimbus/. Nothing outside these two containers
    # ever touches this app directly.
    networks:
      - pi-shared
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/api/healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

networks:
  pi-shared:
    external: true
    name: pi-shared

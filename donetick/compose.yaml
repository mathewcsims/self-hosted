# Donetick (https://github.com/donetick/donetick) — recurring-chore tracker
# (bins, calling family, anything repeating), distinct from Vikunja which
# handles project/work-style tasks. Storage backend = ./data (sqlite) on this
# Mac.
#
# Same architecture as copyparty/Memos/Vikunja: TLS and the public hostname
# (donetick.mathewcsims.uk) are handled by the Caddy reverse proxy on your
# Raspberry Pi (see ../pi-reverse-proxy/). This Mac only serves plain HTTP on
# the LAN; the Pi terminates HTTPS and forwards to MAC_IP:2021 here.
#
# All config is via DT_* env vars (Donetick is a Go/Viper app — every YAML
# config key has a DT_<UPPER_SNAKE_DOTTED_PATH> env var equivalent; verified
# against the project's own config/selfhosted.yaml + config/selfhosted.env
# templates rather than assumed). No separate config file is mounted; the
# image ships its own default selfhosted.yaml baked in (DT_ENV=selfhosted is
# already set by the Dockerfile) and these env vars override individual keys
# on top of it.
#
# All secrets live in ./.env (gitignored — see .env.example for the template).
name: donetick

services:
  donetick:
    # Pinned to the latest STABLE tag (not the v0.1.76-beta.* series actively
    # being published) — confirmed via GitHub releases, not just Docker Hub's
    # tag list. Checked GitHub Security Advisories: one real critical
    # (GHSA-hjjg-vw4j-986x / CVE-2025-47945, CVSS 9.1 — a predictable default
    # JWT signing secret allowed full account takeover), fixed in v0.1.44, so
    # long patched here — but the underlying risk is real, which is why
    # DT_JWT_SECRET below is a freshly generated random value, never the
    # template's own placeholder string.
    image: docker.io/donetick/donetick:v0.1.75
    container_name: donetick
    restart: unless-stopped
    # Do NOT set `user:` — on podman-machine (macOS) the container's root maps
    # to your host user, giving sane ownership on the bind mount below (same
    # reasoning as copyparty/Vikunja's compose.yaml).
    environment:
      TZ: Europe/London

      DT_JWT_SECRET: ${DT_JWT_SECRET}
      DT_DATABASE_TYPE: sqlite
      DT_SERVER_PORT: "2021"

      # Used for correct link generation (e.g. password-reset emails) behind
      # the reverse proxy — same class of setting as Memos's
      # MEMOS_INSTANCE_URL / Vikunja's VIKUNJA_SERVICE_PUBLICURL.
      DT_SERVER_PUBLIC_HOST: https://donetick.mathewcsims.uk
      DT_EMAIL_APP_HOST: https://donetick.mathewcsims.uk
      # No SMTP configured (same as Memos/Vikunja — needs your own provider
      # if wanted later). Without it, password-reset URLs are logged to the
      # container's own stdout instead of emailed — `podman logs donetick`
      # to retrieve one if ever needed.
      DT_EMAIL_LOG_RAW_URL: "true"

      # MUST include the real public origin or the web app breaks (confirmed
      # via a GitHub discussion thread on this exact symptom) — CORS is
      # enforced by the app itself, not just Caddy. The three non-HTTPS
      # entries are the app's own documented requirement for its Android app
      # to work later (capacitor://localhost etc.) — harmless to leave in,
      # they don't grant a real browser anything (no bearer-token/cookie
      # ever gets attached to a request whose Origin isn't one of these).
      DT_SERVER_CORS_ALLOW_ORIGINS: https://donetick.mathewcsims.uk,https://localhost,http://localhost,capacitor://localhost
      # Same reasoning, for the realtime/SSE endpoint specifically — the
      # image's own default is a bare "*" (any origin); scoped down to just
      # the real domain since nothing here needs cross-origin realtime access.
      DT_REALTIME_ALLOWED_ORIGINS: https://donetick.mathewcsims.uk

      # Self-registration is open by default and there is NO CLI/env-var way
      # to seed the first account — so this starts "false" (open) just long
      # enough for the one account this instance needs to be created through
      # the normal signup form, then gets flipped to "true" and redeployed
      # (`podman compose up -d`, not `restart` — env changes need that).
      # See SETUP.md for the exact before/after state.
      DT_IS_USER_CREATION_DISABLED: "false"

      # Built-in per-client rate limit (300 req/60s by default — left as-is).
      # Real per-real-IP protection lives at the Caddy layer instead (see
      # ../pi-reverse-proxy/Caddyfile) — Donetick has no documented trusted-
      # proxy/X-Forwarded-For config (confirmed absent from its config
      # schema), so behind this reverse proxy it can only ever see "the
      # Caddy container" as one client, not real distinct users. Its own
      # limit is a loose secondary backstop, not the actual enforcement.
    volumes:
      - ./data:/donetick-data
    ports:
      # IMPORTANT (same podman-machine quirk as every other Mac app here): a
      # published port must be bound to the Mac's *actual* LAN IP —
      # podman-machine cannot bind 0.0.0.0 to the real interface. The Pi's
      # reverse proxy connects to this address. The router does NOT forward
      # 2021, so this is never directly internet-facing.
      - "10.0.1.14:2021:2021"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:2021/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

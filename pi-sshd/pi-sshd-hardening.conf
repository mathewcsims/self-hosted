# /etc/ssh/sshd_config.d/pi-sshd-hardening.conf
#
# Disables password auth only — root login stays "without-password" (its
# existing default; untouched here), sshd itself keeps running as a
# fallback. There is deliberately no ~/.ssh/authorized_keys on this host —
# the only real login path is Tailscale SSH (implemented inside tailscaled,
# bypasses system sshd entirely), so this makes sshd fully unusable for
# interactive login regardless — expected, not a mistake. This file's only
# job is closing the password-guessing surface on whichever interface sshd
# listens on (currently 0.0.0.0:22 and [::]:22 — see SETUP.md for the
# router-forwarding caveat this can't verify).
PasswordAuthentication no

# MACs/Ciphers/KexAlgorithms below are otherwise just Debian's compiled-in
# OpenSSH defaults, confirmed via `sshd -T` before this file existed — that
# default MAC list includes hmac-sha1 and hmac-sha1-etm, both SHA-1-based
# and legacy. Trimmed to the modern set only; Ciphers/KexAlgorithms were
# already fine (no legacy entries in the defaults) but pinned explicitly
# here too, so this file is now the actual source of truth rather than
# "whatever this Debian version ships today."
MACs umac-128-etm@openssh.com,hmac-sha2-256-etm@openssh.com,hmac-sha2-512-etm@openssh.com,umac-128@openssh.com,hmac-sha2-256,hmac-sha2-512
Ciphers chacha20-poly1305@openssh.com,aes128-ctr,aes192-ctr,aes256-ctr,aes128-gcm@openssh.com,aes256-gcm@openssh.com
KexAlgorithms sntrup761x25519-sha512,sntrup761x25519-sha512@openssh.com,curve25519-sha256,curve25519-sha256@libssh.org,ecdh-sha2-nistp256,ecdh-sha2-nistp384,ecdh-sha2-nistp521,diffie-hellman-group-exchange-sha256,diffie-hellman-group16-sha512,diffie-hellman-group18-sha512,diffie-hellman-group14-sha256

# Ghost (https://ghost.org) — self-hosted blog, replacing paid Ghost(Pro)
# hosting at blog.mathewcsims.uk. Same architecture as every other Mac app
# here: TLS and the public hostname are handled by the Caddy reverse proxy
# on the Pi (see ../pi-reverse-proxy/); this Mac only serves plain HTTP on
# the LAN.
#
# MySQL, not sqlite: Ghost's own docs are explicit that "MySQL 8 is the only
# supported database in production" (sqlite works in dev but isn't QA'd for
# production use, and Ghost's own Docker image made MySQL the default as of
# 5.9) — so unlike Vikunja/Donetick this needs a real DB sidecar, same
# pattern as Nimbus's nimbus-db.
#
# All secrets live in ./.env (gitignored — see .env.example for the
# template).
name: blog

services:
  db:
    # MySQL 8 — pinned to an exact patch version, not a floating `:8` tag.
    image: mysql:8.4.10
    container_name: blog-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ghost
      MYSQL_USER: ghost
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./db:/var/lib/mysql
    # No `ports:` — reached only by the ghost service, by container name,
    # over this project's own default network. Never exposed to the LAN.
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  ghost:
    # Pinned to an exact version, not :latest — checked GitHub Security
    # Advisories directly (github.com/advisories, npm ecosystem, "ghost"):
    # several real past CVEs (critical SQL injection in the Content API,
    # critical cache-poisoning XSS, RCE via malicious themes, CSRF/2FA
    # bypasses) but every one caps out at or below 6.36.0 — 6.50.0 is
    # current and patched against all of them. The theme-RCE class
    # specifically only applies if you install untrusted third-party
    # themes — deliberately staying on the bundled default (Casper) theme
    # here, not installing anything else, to keep that whole class of risk
    # off the table entirely rather than just "patched for now."
    image: ghost:6.53.0
    container_name: ghost
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      tinybird-sync:
        condition: service_completed_successfully
        required: false
      tinybird-deploy:
        condition: service_completed_successfully
        required: false
    # Do NOT set `user:` — on podman-machine (macOS) the container's root
    # maps to your host user, giving sane ownership on the bind mount below
    # (same reasoning as copyparty/Vikunja/Donetick's compose.yaml).
    environment:
      url: https://blog.mathewcsims.uk
      NODE_ENV: production

      database__client: mysql
      database__connection__host: db
      database__connection__user: ghost
      database__connection__password: ${DB_PASSWORD}
      database__connection__database: ghost

      # SMTP — needed for staff invites, password-reset emails, and (as
      # discovered during setup) mandatory device-verification emails on
      # every new session login, so this isn't optional even for day-to-day
      # admin use. Proton Mail, STARTTLS on 587 (not implicit TLS — secure
      # is deliberately "false" here since Ghost/Nodemailer treats 587 as
      # STARTTLS-upgrade, matching Proton's own documented SMTP settings).
      mail__transport: SMTP
      mail__options__host: ${SMTP_HOST}
      mail__options__port: ${SMTP_PORT}
      mail__options__secure: "false"
      mail__options__auth__user: ${SMTP_USER}
      mail__options__auth__pass: ${SMTP_PASSWORD}
      mail__from: ${MAIL_FROM}

      # Web analytics — Ghost's own native Stats page, backed by Tinybird
      # (ghost.org's official analytics partner as of Ghost 6.0). Cookie-less
      # by design: visitor uniqueness uses a daily-rotating salted signature,
      # not cookies or raw-IP geolocation, so no cookie-banner obligation per
      # Ghost's own docs. Values verbatim from Ghost's official reference
      # compose (github.com/TryGhost/ghost-docker) except for how the
      # Tinybird workspace itself gets set up — see the tinybird-sync/
      # tinybird-deploy services below and SETUP.md for why this uses a
      # pre-existing admin token instead of Ghost's documented `tb login`
      # flow (that flow's browser/device-code OAuth handshake never
      # completed in this environment, root cause not identified).
      tinybird__tracker__endpoint: https://blog.mathewcsims.uk/.ghost/analytics/api/v1/page_hit
      tinybird__adminToken: ${TINYBIRD_ADMIN_TOKEN:-}
      tinybird__workspaceId: ${TINYBIRD_WORKSPACE_ID:-}
      tinybird__tracker__datasource: analytics_events
      tinybird__stats__endpoint: ${TINYBIRD_API_URL:-https://api.tinybird.co}
    volumes:
      - ./content:/var/lib/ghost/content
    ports:
      # IMPORTANT (same podman-machine quirk as every other Mac app here): a
      # published port must be bound to the Mac's *actual* LAN IP —
      # podman-machine cannot bind 0.0.0.0 to the real interface. The Pi's
      # reverse proxy connects to this address. The router does NOT forward
      # 2368, so this is never directly internet-facing.
      - "10.0.1.14:2368:2368"
    healthcheck:
      # No curl/wget in this image (confirmed by exec'ing in and checking) —
      # `node` is the only thing guaranteed present, so it's the healthcheck
      # tool instead.
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:2368', r => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── Tinybird-backed web analytics (Ghost's Stats page) ────────────────
  # traffic-analytics is Ghost's own official service (github.com/TryGhost/
  # ghost-docker), adapted for this repo's split topology: their reference
  # assumes Caddy runs on the SAME host as Ghost, reaching traffic-analytics
  # by container name with no published port. Our Caddy runs on the Pi, so
  # this needs a published port on the Mac's LAN IP instead, same pattern as
  # every other Mac-resident service — see pi-reverse-proxy/Caddyfile's
  # blog.mathewcsims.uk block for the matching route.
  #
  # tinybird-sync/tinybird-deploy are a ONE-TIME setup step (see SETUP.md),
  # not part of normal `up -d` — they deploy Ghost's bundled Tinybird
  # datasource/pipe schema into your workspace. Ghost's own documented flow
  # uses an extra `tinybird-login` container running `tb login`'s browser/
  # device-code OAuth flow first; that flow never completed in this
  # environment (browser approval never got picked up by the polling CLI,
  # and the alternate localhost-callback method wasn't fully testable
  # either) — root cause not identified, possibly network/proxy-related.
  # Skipped entirely here: tinybird-deploy authenticates with a pre-existing
  # workspace admin token (copied directly from the Tinybird dashboard's
  # Settings → Tokens page, no CLI login needed at all) via `tb`'s
  # documented --token flag.
  traffic-analytics:
    image: ghost/traffic-analytics:1.0.265@sha256:14121127f23440f64e725bec2370d9de0d64ba956c8d3001478ce922e94348d7
    container_name: blog-traffic-analytics
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PROXY_TARGET: ${TINYBIRD_API_URL:-https://api.tinybird.co}/v0/events
      SALT_STORE_TYPE: file
      SALT_STORE_FILE_PATH: /data/salts.json
      TINYBIRD_TRACKER_TOKEN: ${TINYBIRD_TRACKER_TOKEN:-}
    volumes:
      - ./traffic-analytics-data:/data
    ports:
      - "10.0.1.14:3001:3000"
    profiles: [analytics]

  tinybird-sync:
    # Same image as the `ghost` service above (deliberately, per Ghost's own
    # comment in their reference config) — copies the Tinybird
    # datasource/pipe schema bundled inside the Ghost image itself into a
    # shared volume, so tinybird-deploy can apply it. No auth needed for
    # this step, it's a plain file copy.
    image: ghost:6.53.0
    container_name: blog-tinybird-sync
    command: >
      sh -c "
        if [ -d /var/lib/ghost/current/core/server/data/tinybird ]; then
          rm -rf /data/tinybird/*;
          cp -rf /var/lib/ghost/current/core/server/data/tinybird/* /data/tinybird/;
          echo 'Tinybird files synced into shared volume.';
        else
          echo 'Tinybird source directory not found.';
        fi
      "
    volumes:
      - tinybird_files:/data/tinybird
    profiles: [analytics]
    restart: "no"

  tinybird-deploy:
    build:
      context: ./tinybird
      dockerfile: Dockerfile
    container_name: blog-tinybird-deploy
    working_dir: /data/tinybird
    # --token/TB_TOKEN is `tb`'s own documented non-interactive auth
    # mechanism (confirmed against Tinybird's CI/CD docs) — takes priority
    # over any .tinyb file, so this never touches the login flow at all.
    command: sh -c "tb --token ${TINYBIRD_ADMIN_TOKEN:?TINYBIRD_ADMIN_TOKEN is required} --host ${TINYBIRD_API_URL:?TINYBIRD_API_URL is required} --cloud deploy"
    volumes:
      - tinybird_files:/data/tinybird
    depends_on:
      tinybird-sync:
        condition: service_completed_successfully
    profiles: [analytics]

volumes:
  tinybird_files:
